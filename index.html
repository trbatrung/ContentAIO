<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave's Content Queue — AI Officer Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f3ee;
    --red: #e63329;
    --gold: #f0a500;
    --blue: #1a6ef5;
    --purple: #7c3aed;
    --green: #16a34a;
    --gray: #2a2a2a;
    --gray-light: #3a3a3a;
    --text-muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .header-left h1 span { color: var(--red); }

  .tagline {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
    font-weight: 300;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .last-updated {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .refresh-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: var(--white);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .refresh-btn:hover { background: #252525; border-color: #555; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #1a1a1a;
    overflow-x: auto;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    padding: 24px 32px;
    border-right: 1px solid #1a1a1a;
    text-align: center;
  }

  .stat:last-child { border-right: none; }

  .stat-number {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
  }

  .stat.ready .stat-number { color: var(--gold); }
  .stat.filmed .stat-number { color: var(--green); }
  .stat.published .stat-number { color: var(--blue); }
  .stat.total .stat-number { color: var(--white); }

  /* FILTERS */
  .filters {
    padding: 24px 48px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid #1a1a1a;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 8px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--white);
    color: var(--black);
    border-color: var(--white);
  }

  /* PILLAR COLORS */
  .filter-btn[data-pillar="The 50/50 Era"].active { background: var(--blue); border-color: var(--blue); color: white; }
  .filter-btn[data-pillar="Problem First. AI Second."].active { background: var(--red); border-color: var(--red); color: white; }
  .filter-btn[data-pillar="AI Officer in the Wild"].active { background: var(--purple); border-color: var(--purple); color: white; }
  .filter-btn[data-pillar="Proof It Works"].active { background: var(--gold); border-color: var(--gold); color: black; }

  /* CONTENT GRID */
  .content-area {
    padding: 32px 48px 48px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1a1a1a;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  /* CARD */
  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    padding: 24px;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .card[data-pillar="The 50/50 Era"]::before { background: var(--blue); }
  .card[data-pillar="Problem First. AI Second."]::before { background: var(--red); }
  .card[data-pillar="AI Officer in the Wild"]::before { background: var(--purple); }
  .card[data-pillar="Proof It Works"]::before { background: var(--gold); }

  .card:hover {
    border-color: #333;
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 12px;
  }

  .card-num {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .status-badge.ready { background: rgba(240,165,0,0.15); color: var(--gold); border: 1px solid rgba(240,165,0,0.3); }
  .status-badge.filmed { background: rgba(22,163,74,0.15); color: #4ade80; border: 1px solid rgba(22,163,74,0.3); }
  .status-badge.published { background: rgba(26,110,245,0.15); color: #60a5fa; border: 1px solid rgba(26,110,245,0.3); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  .card-hook {
    font-size: 13px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 16px;
    font-style: italic;
  }

  .card-hook::before { content: '"'; }
  .card-hook::after { content: '"'; }

  .card-divider {
    height: 1px;
    background: #1e1e1e;
    margin-bottom: 16px;
  }

  .card-remember-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .card-remember {
    font-size: 13px;
    color: #ccc;
    line-height: 1.6;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #1e1e1e;
  }

  .pillar-tag {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 500;
  }

  .pillar-tag.blue { background: rgba(26,110,245,0.1); color: #60a5fa; }
  .pillar-tag.red { background: rgba(230,51,41,0.1); color: #f87171; }
  .pillar-tag.purple { background: rgba(124,58,237,0.1); color: #a78bfa; }
  .pillar-tag.gold { background: rgba(240,165,0,0.1); color: var(--gold); }

  .card-date {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state p { font-size: 14px; margin-top: 8px; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 80px;
    color: var(--text-muted);
  }

  .loading-dots span {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    margin: 0 3px;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ERROR */
  .error-state {
    background: rgba(230,51,41,0.08);
    border: 1px solid rgba(230,51,41,0.2);
    border-radius: 10px;
    padding: 24px;
    margin: 32px 0;
    color: #f87171;
    font-size: 13px;
    line-height: 1.6;
  }

  /* PILLARS LEGEND */
  .pillars-legend {
    padding: 0 48px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #888;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* FADE IN */
  .card {
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header, .filters, .content-area, .pillars-legend { padding-left: 20px; padding-right: 20px; }
    .stat { padding: 16px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Dave's Content <span>Queue</span></h1>
    <p class="tagline">AI Officer Institute · Problem first. AI second. ROI always.</p>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">Loading...</span>
    <button class="refresh-btn" onclick="loadData()">↺ Refresh</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat total">
    <span class="stat-number" id="statTotal">—</span>
    <span class="stat-label">Total</span>
  </div>
  <div class="stat ready">
    <span class="stat-number" id="statReady">—</span>
    <span class="stat-label">Ready to Film</span>
  </div>
  <div class="stat filmed">
    <span class="stat-number" id="statFilmed">—</span>
    <span class="stat-label">Filmed</span>
  </div>
  <div class="stat published">
    <span class="stat-number" id="statPublished">—</span>
    <span class="stat-label">Published</span>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all" onclick="filterCards('all', this)">All</button>
  <button class="filter-btn" data-filter="Ready to Film" onclick="filterCards('Ready to Film', this)">🎬 Ready to Film</button>
  <button class="filter-btn" data-filter="Filmed" onclick="filterCards('Filmed', this)">✅ Filmed</button>
  <button class="filter-btn" data-filter="Published" onclick="filterCards('Published', this)">🚀 Published</button>
  <button class="filter-btn" data-pillar="The 50/50 Era" data-filter-pillar="The 50/50 Era" onclick="filterPillar('The 50/50 Era', this)">The 50/50 Era</button>
  <button class="filter-btn" data-pillar="Problem First. AI Second." data-filter-pillar="Problem First. AI Second." onclick="filterPillar('Problem First. AI Second.', this)">Problem First</button>
  <button class="filter-btn" data-pillar="AI Officer in the Wild" data-filter-pillar="AI Officer in the Wild" onclick="filterPillar('AI Officer in the Wild', this)">AI Officer in the Wild</button>
  <button class="filter-btn" data-pillar="Proof It Works" data-filter-pillar="Proof It Works" onclick="filterPillar('Proof It Works', this)">Proof It Works</button>
</div>

<div class="content-area">
  <div class="loading" id="loadingState">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p style="margin-top:16px; font-size:13px;">Loading content queue...</p>
  </div>
  <div id="errorState" style="display:none"></div>
  <div id="contentGrid" style="display:none">
    <p class="section-title" id="sectionLabel">All Content</p>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</div>

<script>
  // ---- CONFIG: paste your Google Sheet CSV URL here ----
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQFgQel0JJ0xTYgnpDzeR6RgSkzmS3xmFhaogJRhPoWI7CcrzgbbzXjeh4ODqTDowOpuY2Lo-iNQx6a/pub?output=csv';

  let allItems = [];
  let currentStatusFilter = 'all';
  let currentPillarFilter = 'all';

  const PILLAR_COLORS = {
    'The 50/50 Era': 'blue',
    'Problem First. AI Second.': 'red',
    'AI Officer in the Wild': 'purple',
    'Proof It Works': 'gold',
  };

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const items = [];
    // Find header row (row with #, Video Name, Pillar, Hook...)
    let headerIdx = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes('Video Name') && lines[i].includes('Pillar')) {
        headerIdx = i;
        break;
      }
    }
    if (headerIdx === -1) return items;

    const headers = parseCSVLine(lines[headerIdx]).map(h => h.trim());

    for (let i = headerIdx + 1; i < lines.length; i++) {
      const cols = parseCSVLine(lines[i]);
      if (!cols[0] || !cols[1] || cols[1].trim() === '') continue;

      const row = {};
      headers.forEach((h, idx) => { row[h] = (cols[idx] || '').trim(); });

      // Skip legend/reference rows
      if (!row['Video Name'] || row['Video Name'].includes('CONTENT PILLARS') || row['Video Name'].includes('STATUS')) continue;
      if (!isNaN(row['#']) && row['Video Name']) {
        items.push({
          num: row['#'],
          title: row['Video Name'],
          pillar: row['Pillar'] || '',
          hook: row['Hook'] || '',
          remember: row['What to Remember'] || '',
          status: row['Status'] || '',
          date: row['Date'] || '',
        });
      }
    }
    return items;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
      else { current += ch; }
    }
    result.push(current);
    return result;
  }

  function getStatusClass(status) {
    if (!status) return '';
    const s = status.toLowerCase();
    if (s.includes('ready')) return 'ready';
    if (s.includes('filmed')) return 'filmed';
    if (s.includes('published')) return 'published';
    return '';
  }

  function renderCards(items) {
    const grid = document.getElementById('cardsGrid');
    if (!items.length) {
      grid.innerHTML = '<div class="empty-state"><p style="font-size:32px">📭</p><p>No content found for this filter.</p></div>';
      return;
    }

    grid.innerHTML = items.map((item, idx) => {
      const statusClass = getStatusClass(item.status);
      const pillarColor = PILLAR_COLORS[item.pillar] || 'blue';
      const delay = (idx * 0.05).toFixed(2);
      return `
        <div class="card" data-pillar="${item.pillar}" data-status="${item.status}" style="animation-delay:${delay}s">
          <div class="card-top">
            <span class="card-num">#${item.num}</span>
            <span class="status-badge ${statusClass}">${item.status || 'No Status'}</span>
          </div>
          <div class="card-title">${item.title}</div>
          ${item.hook ? `<div class="card-hook">${item.hook}</div>` : ''}
          ${item.remember ? `
            <div class="card-divider"></div>
            <div class="card-remember-label">What to Remember</div>
            <div class="card-remember">${item.remember}</div>
          ` : ''}
          <div class="card-footer">
            <span class="pillar-tag ${pillarColor}">${item.pillar}</span>
            ${item.date ? `<span class="card-date">${item.date}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function updateStats(items) {
    document.getElementById('statTotal').textContent = items.length;
    document.getElementById('statReady').textContent = items.filter(i => i.status.toLowerCase().includes('ready')).length;
    document.getElementById('statFilmed').textContent = items.filter(i => i.status.toLowerCase().includes('filmed') && !i.status.toLowerCase().includes('ready')).length;
    document.getElementById('statPublished').textContent = items.filter(i => i.status.toLowerCase().includes('published')).length;
  }

  function applyFilters() {
    let filtered = [...allItems];
    if (currentStatusFilter !== 'all') {
      filtered = filtered.filter(i => i.status.toLowerCase().includes(currentStatusFilter.toLowerCase()));
    }
    if (currentPillarFilter !== 'all') {
      filtered = filtered.filter(i => i.pillar === currentPillarFilter);
    }
    renderCards(filtered);
    const label = [
      currentStatusFilter !== 'all' ? currentStatusFilter : '',
      currentPillarFilter !== 'all' ? currentPillarFilter : '',
    ].filter(Boolean).join(' · ') || 'All Content';
    document.getElementById('sectionLabel').textContent = label;
  }

  function filterCards(status, btn) {
    currentStatusFilter = status;
    document.querySelectorAll('.filter-btn:not([data-pillar])').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function filterPillar(pillar, btn) {
    if (currentPillarFilter === pillar) {
      currentPillarFilter = 'all';
      btn.classList.remove('active');
    } else {
      currentPillarFilter = pillar;
      document.querySelectorAll('.filter-btn[data-pillar]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    applyFilters();
  }

  async function loadData() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('contentGrid').style.display = 'none';
    document.getElementById('errorState').style.display = 'none';

    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error('Could not fetch sheet');
      const text = await res.text();
      allItems = parseCSV(text);

      updateStats(allItems);
      applyFilters();

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('contentGrid').style.display = 'block';
      document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch (err) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorState').innerHTML = `
        <div class="error-state">
          <strong>⚠️ Could not load sheet</strong><br><br>
          Make sure your Google Sheet is published as CSV:<br>
          File → Share → Publish to web → Select sheet → CSV → Publish<br><br>
          Then paste the CSV link into the SHEET_CSV_URL in this file.<br><br>
          <small style="opacity:0.6">${err.message}</small>
        </div>`;
    }
  }

  loadData();
</script>
</body>
</html>
