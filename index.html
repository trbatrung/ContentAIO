<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave's Content Queue — AI Officer Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f3ee;
    --red: #e63329;
    --gold: #f0a500;
    --blue: #1a6ef5;
    --purple: #7c3aed;
    --green: #16a34a;
    --text-muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .header-left h1 span { color: var(--red); }

  .tagline {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
    font-weight: 300;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .last-updated { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

  .refresh-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: var(--white);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: #252525; }

  .stats-bar {
    display: flex;
    border-bottom: 1px solid #1a1a1a;
    overflow-x: auto;
  }

  .stat {
    flex: 1;
    min-width: 100px;
    padding: 24px 32px;
    border-right: 1px solid #1a1a1a;
    text-align: center;
  }
  .stat:last-child { border-right: none; }

  .stat-number {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
  }

  .stat.ready .stat-number { color: var(--gold); }
  .stat.filmed .stat-number { color: #a78bfa; }
  .stat.published .stat-number { color: #4ade80; }

  .filters {
    padding: 20px 48px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid #1a1a1a;
    align-items: center;
  }

  .filter-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-right: 4px; }

  .filter-btn {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #555; color: #ccc; }
  .filter-btn.active { background: var(--white); color: var(--black); border-color: var(--white); }
  .filter-btn[data-pillar="The 50/50 Era"].active { background: var(--blue); border-color: var(--blue); color: white; }
  .filter-btn[data-pillar="Problem First. AI Second."].active { background: var(--red); border-color: var(--red); color: white; }
  .filter-btn[data-pillar="AI Officer in the Wild"].active { background: var(--purple); border-color: var(--purple); color: white; }
  .filter-btn[data-pillar="Proof It Works"].active { background: var(--gold); border-color: var(--gold); color: black; }

  .content-area { padding: 32px 48px 64px; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #1a1a1a; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    padding: 24px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .card[data-pillar="The 50/50 Era"]::before { background: var(--blue); }
  .card[data-pillar="Problem First. AI Second."]::before { background: var(--red); }
  .card[data-pillar="AI Officer in the Wild"]::before { background: var(--purple); }
  .card[data-pillar="Proof It Works"]::before { background: var(--gold); }

  .card:hover { border-color: #2a2a2a; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 12px;
  }

  .card-num { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; }

  .status-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .status-badge.ready    { background: rgba(240,165,0,0.15); color: var(--gold); border: 1px solid rgba(240,165,0,0.3); }
  .status-badge.filmed   { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .status-badge.published { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  .card-hook { font-size: 13px; color: #aaa; line-height: 1.6; margin-bottom: 16px; font-style: italic; }
  .card-hook::before { content: '"'; }
  .card-hook::after { content: '"'; }

  .card-divider { height: 1px; background: #1e1e1e; margin-bottom: 14px; }

  .card-remember-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .card-remember { font-size: 13px; color: #ccc; line-height: 1.6; }

  /* STATUS ACTIONS */
  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #1e1e1e;
    flex-wrap: wrap;
    align-items: center;
  }

  .action-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-filmed {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
  }
  .btn-filmed:hover:not(:disabled) { background: rgba(124,58,237,0.3); }

  .btn-published {
    background: rgba(74,222,128,0.15);
    color: #4ade80;
    border: 1px solid rgba(74,222,128,0.3);
  }
  .btn-published:hover:not(:disabled) { background: rgba(74,222,128,0.3); }

  .btn-reset {
    background: transparent;
    color: #555;
    border: 1px solid #2a2a2a;
    margin-left: auto;
  }
  .btn-reset:hover:not(:disabled) { color: #888; border-color: #444; }

  .card-pillar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }

  .pillar-tag {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 500;
  }
  .pillar-tag.blue   { background: rgba(26,110,245,0.1); color: #60a5fa; }
  .pillar-tag.red    { background: rgba(230,51,41,0.1); color: #f87171; }
  .pillar-tag.purple { background: rgba(124,58,237,0.1); color: #a78bfa; }
  .pillar-tag.gold   { background: rgba(240,165,0,0.1); color: var(--gold); }

  .card-date { font-size: 11px; color: var(--text-muted); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: var(--white);
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
    max-width: 300px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(74,222,128,0.4); }
  .toast.error   { border-color: rgba(230,51,41,0.4); color: #f87171; }

  /* LOADING */
  .loading { text-align: center; padding: 80px; color: var(--text-muted); }
  .loading-dots span { display: inline-block; width: 8px; height: 8px; background: var(--red); border-radius: 50%; margin: 0 3px; animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  .error-state { background: rgba(230,51,41,0.08); border: 1px solid rgba(230,51,41,0.2); border-radius: 10px; padding: 24px; color: #f87171; font-size: 13px; line-height: 1.8; }

  .empty-state { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  @media (max-width: 600px) {
    header, .filters, .content-area { padding-left: 20px; padding-right: 20px; }
    .stat { padding: 16px 12px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Dave's Content <span>Queue</span></h1>
    <p class="tagline">AI Officer Institute · Problem first. AI second. ROI always.</p>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">Loading...</span>
    <button class="refresh-btn" onclick="loadData()">↺ Refresh</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-number" id="statTotal">—</span>
    <span class="stat-label">Total</span>
  </div>
  <div class="stat ready">
    <span class="stat-number" id="statReady">—</span>
    <span class="stat-label">Ready to Film</span>
  </div>
  <div class="stat filmed">
    <span class="stat-number" id="statFilmed">—</span>
    <span class="stat-label">Filmed</span>
  </div>
  <div class="stat published">
    <span class="stat-number" id="statPublished">—</span>
    <span class="stat-label">Published</span>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="filterStatus('all', this)">All</button>
  <button class="filter-btn" onclick="filterStatus('Ready to Film', this)">🎬 Ready to Film</button>
  <button class="filter-btn" onclick="filterStatus('Filmed', this)">✅ Filmed</button>
  <button class="filter-btn" onclick="filterStatus('Published', this)">🚀 Published</button>
  <button class="filter-btn" data-pillar="The 50/50 Era" onclick="filterPillar('The 50/50 Era', this)">The 50/50 Era</button>
  <button class="filter-btn" data-pillar="Problem First. AI Second." onclick="filterPillar('Problem First. AI Second.', this)">Problem First</button>
  <button class="filter-btn" data-pillar="AI Officer in the Wild" onclick="filterPillar('AI Officer in the Wild', this)">AI Officer in the Wild</button>
  <button class="filter-btn" data-pillar="Proof It Works" onclick="filterPillar('Proof It Works', this)">Proof It Works</button>
</div>

<div class="content-area">
  <div class="loading" id="loadingState">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p style="margin-top:16px; font-size:13px;">Loading content queue...</p>
  </div>
  <div id="errorState" style="display:none"></div>
  <div id="contentGrid" style="display:none">
    <p class="section-title" id="sectionLabel">All Content</p>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ⚠️ PASTE YOUR APPS SCRIPT WEB APP URL HERE after deploying
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzBIqYSmUBdZk-MTeHKX9f1i4ljL3GshJ_qhVzvmxWW7cW9MkRF6Kgc6OrKupq75DCT/exec';

  const PILLAR_COLORS = {
    'The 50/50 Era': 'blue',
    'Problem First. AI Second.': 'red',
    'AI Officer in the Wild': 'purple',
    'Proof It Works': 'gold',
  };

  let allItems = [];
  let currentStatusFilter = 'all';
  let currentPillarFilter = 'all';

  // STATUS FLOW: Ready to Film → Filmed → Published → Ready to Film
  const STATUS_NEXT = {
    'ready to film': 'Filmed',
    'filmed':        'Published',
    'published':     'Ready to Film',
  };

  function getStatusClass(s) {
    if (!s) return '';
    const l = s.toLowerCase();
    if (l.includes('ready')) return 'ready';
    if (l.includes('published')) return 'published';
    if (l.includes('filmed')) return 'filmed';
    return '';
  }

  function renderCards(items) {
    const grid = document.getElementById('cardsGrid');
    if (!items.length) {
      grid.innerHTML = '<div class="empty-state">📭 No content found for this filter.</div>';
      return;
    }

    grid.innerHTML = items.map((item, idx) => {
      const sc    = getStatusClass(item.status);
      const pc    = PILLAR_COLORS[item.pillar] || 'blue';
      const delay = (idx * 0.05).toFixed(2);
      const sl    = (item.status || '').toLowerCase();

      const canFilm    = sl.includes('ready');
      const canPublish = sl.includes('filmed') && !sl.includes('ready');
      const canReset   = sl.includes('published');

      return `
        <div class="card" data-pillar="${item.pillar}" data-status="${item.status}" data-num="${item.num}" style="animation-delay:${delay}s">
          <div class="card-top">
            <span class="card-num">#${item.num}</span>
            <span class="status-badge ${sc}">${item.status || 'No Status'}</span>
          </div>
          <div class="card-title">${item.title}</div>
          ${item.hook ? `<div class="card-hook">${item.hook}</div>` : ''}
          ${item.remember ? `
            <div class="card-divider"></div>
            <div class="card-remember-label">What to Remember</div>
            <div class="card-remember">${item.remember}</div>
          ` : ''}
          <div class="card-pillar-row">
            <span class="pillar-tag ${pc}">${item.pillar}</span>
            ${item.date ? `<span class="card-date">${item.date}</span>` : ''}
          </div>
          <div class="card-actions">
            <button class="action-btn btn-filmed" onclick="updateStatus('${item.num}', 'Filmed', this)" ${canFilm ? '' : 'disabled'}>
              🎬 Mark as Filmed
            </button>
            <button class="action-btn btn-published" onclick="updateStatus('${item.num}', 'Published', this)" ${canPublish ? '' : 'disabled'}>
              🚀 Mark as Published
            </button>
            <button class="action-btn btn-reset" onclick="updateStatus('${item.num}', 'Ready to Film', this)" ${canReset ? '' : 'disabled'} title="Reset to Ready to Film">
              ↺
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  async function updateStatus(num, status, btn) {
    // Disable all buttons on this card
    const card = btn.closest('.card');
    card.querySelectorAll('.action-btn').forEach(b => b.disabled = true);

    // Optimistic UI update
    const badge = card.querySelector('.status-badge');
    badge.textContent = status;
    badge.className = 'status-badge ' + getStatusClass(status);

    showToast('Updating...', '');

    try {
      const url = `${WEB_APP_URL}?num=${encodeURIComponent(num)}&status=${encodeURIComponent(status)}`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.success) {
        showToast(`✅ #${num} marked as ${status}`, 'success');
        // Update local data
        const item = allItems.find(i => i.num === String(num));
        if (item) item.status = status;
        updateStats(allItems);
        // Re-render this card
        setTimeout(() => applyFilters(), 800);
      } else {
        throw new Error(data.error || 'Update failed');
      }
    } catch (err) {
      showToast('❌ ' + err.message, 'error');
      // Re-enable buttons on failure
      card.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
    }
  }

  function updateStats(items) {
    document.getElementById('statTotal').textContent     = items.length;
    document.getElementById('statReady').textContent     = items.filter(i => i.status.toLowerCase().includes('ready')).length;
    document.getElementById('statFilmed').textContent    = items.filter(i => i.status.toLowerCase() === 'filmed').length;
    document.getElementById('statPublished').textContent = items.filter(i => i.status.toLowerCase().includes('published')).length;
  }

  function applyFilters() {
    let filtered = [...allItems];
    if (currentStatusFilter !== 'all') filtered = filtered.filter(i => i.status.toLowerCase().includes(currentStatusFilter.toLowerCase()));
    if (currentPillarFilter  !== 'all') filtered = filtered.filter(i => i.pillar === currentPillarFilter);
    renderCards(filtered);
    const label = [
      currentStatusFilter !== 'all' ? currentStatusFilter : '',
      currentPillarFilter  !== 'all' ? currentPillarFilter  : '',
    ].filter(Boolean).join(' · ') || 'All Content';
    document.getElementById('sectionLabel').textContent = label;
  }

  function filterStatus(status, btn) {
    currentStatusFilter = status;
    document.querySelectorAll('.filter-btn:not([data-pillar])').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function filterPillar(pillar, btn) {
    if (currentPillarFilter === pillar) { currentPillarFilter = 'all'; btn.classList.remove('active'); }
    else { currentPillarFilter = pillar; document.querySelectorAll('.filter-btn[data-pillar]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    applyFilters();
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = 'toast', 3000);
  }

  async function loadData() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('contentGrid').style.display  = 'none';
    document.getElementById('errorState').style.display   = 'none';

    try {
      const res  = await fetch('./data.json?t=' + Date.now());
      if (!res.ok) throw new Error('data.json not found — run testPublish() in Apps Script first');
      const data = await res.json();
      allItems   = data.items || [];

      updateStats(allItems);
      applyFilters();

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('contentGrid').style.display  = 'block';
      const updated = data.lastUpdated ? new Date(data.lastUpdated).toLocaleString() : new Date().toLocaleTimeString();
      document.getElementById('lastUpdated').textContent = 'Updated ' + updated;
    } catch (err) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display   = 'block';
      document.getElementById('errorState').innerHTML = `
        <div class="error-state">
          <strong>⚠️ Could not load data.json</strong><br><br>
          Run <strong>testPublish()</strong> in Google Apps Script first.<br>
          This pushes your sheet data to GitHub automatically.<br><br>
          <small style="opacity:0.5">${err.message}</small>
        </div>`;
    }
  }

  loadData();
</script>
</body>
</html>
